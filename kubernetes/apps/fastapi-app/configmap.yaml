---
# ✅ ConfigMap - Configuração da aplicação
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: fastapi
  labels:
    app: fastapi-app
data:
  # ✅ Arquivo de configuração YAML
  config.yaml: |
    app:
      name: "fastapi-app"
      version: "1.0.0"
      environment: "development"
    
    server:
      host: "0.0.0.0"
      port: 8000
      workers: 4
      reload: false
    
    logging:
      level: "INFO"
      format: "json"
      output: "stdout"
    
    database:
      enabled: false
    
    cache:
      enabled: false
  
  # ✅ Arquivo de ambiente
  app.env: |
    ENVIRONMENT=development
    LOG_LEVEL=INFO
    DEBUG=false
    WORKERS=4
  
  # ✅ Script de inicialização (opcional)
  entrypoint.sh: |
    #!/bin/bash
    set -e
    
    echo "Starting FastAPI Application..."
    echo "Environment: ${ENVIRONMENT}"
    echo "Log Level: ${LOG_LEVEL}"
    
    # Aqui você pode adicionar comandos de setup
    # Por exemplo: database migrations, cache warming, etc
    
    # Executar a aplicação
    exec uvicorn main:app --host 0.0.0.0 --port 8000

---
# 🔐 Secret - Dados sensíveis (não faça isso em produção!)
# Em produção, use: AWS Secrets Manager, HashiCorp Vault, etc
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secrets
  namespace: fastapi
  labels:
    app: fastapi-app
type: Opaque
stringData:
  # ✅ Apenas exemplo - NUNCA cometa secrets no Git!
  # Isso será ignorado pelo .gitignore
  DATABASE_URL: "postgresql://user:password@localhost:5432/fastapi"
  API_KEY: "seu-api-key-secreto"
  JWT_SECRET: "seu-jwt-secret-longissimo"

---
# 📊 HorizontalPodAutoscaler - Auto-scaling baseado em métricas
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-app
  namespace: fastapi
spec:
  # ✅ O que fazer escalar
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-app
  
  # ✅ Limites de réplicas
  minReplicas: 2
  maxReplicas: 10
  
  # ✅ Métricas para escalar
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70      # Escalar quando CPU > 70%
  
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80      # Escalar quando Mem > 80%
  
  # ✅ Comportamento de escala
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Aguardar 5 min antes de reduzir
      policies:
      - type: Percent
        value: 50                       # Remover máximo 50% dos pods
        periodSeconds: 60
    
    scaleUp:
      stabilizationWindowSeconds: 0    # Escalar imediatamente
      policies:
      - type: Percent
        value: 100                      # Adicionar 100% (máximo 1 por vez com min=2)
        periodSeconds: 60
